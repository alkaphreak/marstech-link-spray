version: 2

updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "main"
    assignees:
      - "alkaphreak"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "main"
    assignees:
      - "alkaphreak"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 5

