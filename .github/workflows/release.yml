name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Bump Version
        id: bump-version
        run: |
          echo "----------------------------------------------------------------"
          echo "Bumping version with type: ${{ github.event.inputs.bump }}"
          ./dev-ops/bump-version.sh ${{ github.event.inputs.bump }}
          NEW_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version to $NEW_VERSION"

      - name: Create Release Branch
        run: |
          echo "----------------------------------------------------------------"
          RELEASE_VERSION="${{ steps.bump-version.outputs.version }}"
          BRANCH_NAME="release/v$RELEASE_VERSION"

          echo "Preparing release branch '$BRANCH_NAME' (replay-friendly mode)"

          # Track whether we stashed local changes
          STASHED=false

          # Attempt to stash any local changes (including untracked) so checkouts won't fail.
          # This is necessary because previous steps (bump-version) can modify files.
          echo "Attempting to stash local changes (if any)"
          STASH_NAME="release-bump-$RELEASE_VERSION-$(date +%s)"
          STASH_OUTPUT=$(git stash push -u -m "$STASH_NAME" 2>&1 || true)
          echo "stash output: $STASH_OUTPUT"
          if ! echo "$STASH_OUTPUT" | grep -q "No local changes to save"; then
            STASHED=true
            echo "Stash created: $STASH_NAME"
          else
            echo "No local changes to stash"
          fi

          # If remote branch exists, fetch and reuse it
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "refs/heads/$BRANCH_NAME"; then
            echo "Remote branch exists; fetching and reusing $BRANCH_NAME"
            git fetch origin "$BRANCH_NAME":"$BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          fi

          # If local branch exists, check it out
          if git show-ref --verify --quiet refs/heads/"$BRANCH_NAME"; then
            echo "Local branch exists; checking out $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            # Create the branch locally if it hasn't been created or checked out above
            if [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH_NAME" ]; then
              git checkout -b "$BRANCH_NAME"
            fi
          fi

          # If we stashed earlier, reapply the stash onto the release branch
          if [ "$STASHED" = "true" ]; then
            echo "Applying previously saved stash onto $BRANCH_NAME"
            if ! git stash pop; then
              echo "Failed to apply stash cleanly. Resolve conflicts manually." >&2
              exit 1
            fi
          fi

          # Configure committer
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Stage and commit only if there are changes
          git add pom.xml
          if git diff --staged --quiet; then
            echo "No staged changes to commit on $BRANCH_NAME"
          else
            git commit -m "chore: bump version to $RELEASE_VERSION for release"
          fi

          # Push branch with --force-with-lease to allow updating existing branches during replays
          git push origin "$BRANCH_NAME" --force-with-lease
          echo "Created or updated release branch: $BRANCH_NAME"

      - name: Build and Test (Jar)
        run: |
          echo "----------------------------------------------------------------"
          echo "Building project (includes tests)"
          mvn -B -ntp clean verify
          ls -lh target/*.jar || true

      - name: Dump JReleaser config (debug)
        run: |
          echo "----------------------------------------------------------------"
          echo "Dumping jreleaser.yml for debug"
          sed -n '1,200p' jreleaser.yml || true
          echo "Listing JReleaser plugin version"
          mvn -q help:evaluate -Dexpression=project.build.plugins | grep -i jreleaser || true

      - name: Prepare JReleaser variables
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          DOCKER_REPO: ${{ vars.DOCKER_REPO || 'marstech-link-spray' }}
        run: |
          echo "----------------------------------------------------------------"
          mkdir -p "$HOME/.jreleaser"
          cat > "$HOME/.jreleaser/config.properties" <<EOF
          # JReleaser variables
          jreleaser.github.token=${JRELEASER_GITHUB_TOKEN}
          docker.hub.username=${DOCKER_HUB_USERNAME}
          docker.hub.password=${DOCKER_HUB_ACCESS_TOKEN}
          docker.repo=${DOCKER_REPO}
          EOF
          chmod 600 "$HOME/.jreleaser/config.properties"
          echo "Created $HOME/.jreleaser/config.properties"

      - name: Release with JReleaser
        run: |
          echo "----------------------------------------------------------------"
          echo "Releasing version: ${{ steps.bump-version.outputs.version }}"
          echo "Running JReleaser with overwrite/update enabled"
          mvn -B -ntp jreleaser:full-release \
            -Djreleaser.config.file=jreleaser.yml \
            -Djreleaser.release.overwrite=true \
            -Djreleaser.release.update=true \
            -Djreleaser.dry.run=false
