name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      test:
        description: 'Run in test mode'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Bump Version
        id: bump-version
        run: |
          ./dev-ops/bump-version.sh ${{ github.event.inputs.bump }}
          NEW_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version to $NEW_VERSION"

      - name: Create Release Branch
        run: |
          RELEASE_VERSION="${{ steps.bump-version.outputs.version }}"
          BRANCH_NAME="release/v$RELEASE_VERSION"
          TEST_MODE="${{ github.event.inputs.test }}"

          echo "Preparing release branch '$BRANCH_NAME' (test mode: $TEST_MODE)"

          # If remote branch exists
          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "refs/heads/$BRANCH_NAME"; then
            if [ "$TEST_MODE" = "true" ] || [ "$TEST_MODE" = "True" ]; then
              echo "Test mode: remote branch exists; fetching and reusing $BRANCH_NAME"
              git fetch origin "$BRANCH_NAME":"$BRANCH_NAME"
              git checkout "$BRANCH_NAME"
            else
              echo "Error: branch '$BRANCH_NAME' already exists on remote 'origin'." >&2
              exit 1
            fi
          fi

          # If local branch exists
          if git show-ref --verify --quiet refs/heads/"$BRANCH_NAME"; then
            if [ "$TEST_MODE" = "true" ] || [ "$TEST_MODE" = "True" ]; then
              echo "Test mode: local branch exists; checking out $BRANCH_NAME"
              git checkout "$BRANCH_NAME"
            else
              echo "Error: branch '$BRANCH_NAME' already exists locally." >&2
              exit 1
            fi
          else
            # Create the branch locally if it hasn't been created or checked out above
            if [ "$(git rev-parse --abbrev-ref HEAD)" != "$BRANCH_NAME" ]; then
              git checkout -b "$BRANCH_NAME"
            fi
          fi

          # Configure committer
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Stage and commit only if there are changes
          git add pom.xml
          if git diff --staged --quiet; then
            echo "No staged changes to commit on $BRANCH_NAME"
          else
            git commit -m "chore: bump version to $RELEASE_VERSION for release"
          fi

          # Push branch. In test mode we allow updating an existing branch with --force-with-lease to avoid failures.
          if [ "$TEST_MODE" = "true" ] || [ "$TEST_MODE" = "True" ]; then
            git push origin "$BRANCH_NAME" --force-with-lease
          else
            git push origin "$BRANCH_NAME"
          fi
          echo "Created or updated release branch: $BRANCH_NAME"

      - name: Build and Test
        run: mvn -B -ntp clean verify
      - name: Release with JReleaser
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          DOCKER_REPO: ${{ vars.DOCKER_REPO || 'marstech-link-spray' }}
        run: mvn jreleaser:full-release
