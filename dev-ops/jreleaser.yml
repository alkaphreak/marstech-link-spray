release:
  overwrite: true
  update: true
  github: {}

distributions:
  marstech-link-spray:
    type: JAVA_BINARY
    artifact:
      path: target/marstech-link-spray-{{projectEffectiveVersion}}.jar
    docker:
      active: ALWAYS
      dockerfile: src/jreleaser/distributions/marstech-link-spray/Dockerfile
      imageName: '{{docker.hub.username}}/{{docker.repo}}'
      tags:
        - latest
        - '{{projectEffectiveVersion}}'
      registries:
        - serverName: docker.io
          username: '{{docker.hub.username}}'
          password: '{{docker.hub.password}}'
