project:
  languages:
    java:
      version: 21

release:
  github:
    owner: alkaphreak

distributions:
  mt-link-spray:
    type: SINGLE_JAR
    artifacts:
      - path: target/mt-link-spray-{{projectVersion}}.jar
    docker:
      active: ALWAYS
      baseImage: eclipse-temurin:21-jre-jammy
      imageNames:
        - alkaphreak/marstech-link-spray:{{projectVersion}}
        - alkaphreak/marstech-link-spray:latest
