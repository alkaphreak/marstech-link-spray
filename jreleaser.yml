release:
  github:
    overwrite: true
    update: true

distributions:
  marstech-link-spray:
    type: JAVA_BINARY
    artifact:
      path: target/marstech-link-spray-{{projectEffectiveVersion}}.jar
    docker:
      active: ALWAYS
      dockerfile: src/jreleaser/distributions/marstech-link-spray/Dockerfile
      imageName: marstech-link-spray
      tags:
        - latest
        - '{{projectEffectiveVersion}}'
      # Configure registries so JReleaser can authenticate and push to Docker Hub.
      registries:
        - serverName: docker.io
          username: ${env.DOCKER_HUB_USERNAME}
          password: ${env.DOCKER_HUB_ACCESS_TOKEN}
