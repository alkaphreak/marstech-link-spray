project:
  name: mt-link-spray
  languages:
    java:
      version: '21'
  stereotype: WEB
  links:
    homepage: https://sol4.space/
    vcsBrowser: https://github.com/alkaphreak/marstech-link-spray
    contact: https://linktr.ee/StephaneRobinJob
    bugTracker: https://marstech.myjetbrains.com/youtrack/projects/MLS
    donation: https://buymeacoffee.com/alkapheak
  icons:
    - url: https://raw.githubusercontent.com/alkaphreak/marstech-link-spray/refs/heads/main/src/main/resources/static/assets/img/favicons/favicon-256.png
      width: 256
      height: 256
  screenshots:
    - url: https://raw.githubusercontent.com/alkaphreak/marstech-link-spray/3fa79c987fe3ebdf4229fb2d327a8aa676e79e27/docs/Screenshot_2026-01-09T15-33-27.078Z--.png
      caption: Main Interface

release:
  github:
    overwrite: true
    owner: alkaphreak
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: '- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}'
        enabled: true
    uploadAssets: ALWAYS

packagers:
  docker:
    active: ALWAYS
    continueOnError: false
    repository:
      active: NEVER
    imageNames:
      - "alkaphreak/marstech-link-spray:{{tagName}}"
      - "alkaphreak/marstech-link-spray:latest"
    useLocalArtifact: true

distributions:
  mt-link-spray:
    type: SINGLE_JAR
    artifacts:
      - path: target/{{distributionName}}-{{projectVersion}}.jar
