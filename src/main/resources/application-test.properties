# -------------------------------------------------------
# Test profile - embedded MongoDB, no external services
# -------------------------------------------------------
server.port=8097

# Embedded MongoDB
spring.mongodb.embedded.version=8.0.5

# Random id generation - explicit test values
mt.link-spray.random-id.charset=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789
mt.link-spray.random-id.length=5
mt.link-spray.random-id.prefix=
mt.link-spray.random-id.cache.enabled=true
mt.link-spray.random-id.cache.depth=100
mt.link-spray.random-id.cache.treshold=10

# Mail - stub SMTP (no real server needed)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
mt.link-spray.notification.mail.sender=test@localhost
mt.link-spray.notification.mail.receiver=test@localhost
